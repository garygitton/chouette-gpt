<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <style>
    .peeking-owl {
      animation: peek-up-down 14s infinite ease-in-out;
    }
    @keyframes peek-up-down {
      /* Temps mort caché derrière le mur */
      0%, 15% { transform: translateY(22px); }
      
      /* Première petite apparition rapide */
      18% { transform: translateY(8px); }
      20%, 25% { transform: translateY(0px); }
      28% { transform: translateY(22px); }
      
      /* Temps mort */
      28%, 55% { transform: translateY(22px); }
      
      /* Apparition longue */
      58%, 75% { transform: translateY(0px); }
      
      /* Petit saut/esquive */
      77% { transform: translateY(10px); }
      79%, 85% { transform: translateY(0px); }
      
      /* Retour caché */
      88%, 100% { transform: translateY(22px); }
    }
    .shifty-pupil {
      animation: look-left-right 14s infinite ease-in-out;
    }
    @keyframes look-left-right {
      0%, 15% { transform: translateX(0); }
      
      /* Regard pendant la première apparition */
      19% { transform: translateX(-2px); }
      22%, 25% { transform: translateX(2px); }
      
      28%, 55% { transform: translateX(0); }
      
      /* Regard saccadé pendant l'apparition longue */
      59% { transform: translateX(0); }
      60%, 63% { transform: translateX(-2.5px); } 
      64%, 67% { transform: translateX(2.5px); }  
      68%, 71% { transform: translateX(-1px); }   
      72%, 75% { transform: translateX(0); }      
      
      /* Regard pendant le petit saut */
      78%, 82% { transform: translateX(-2px); }
      83%, 85% { transform: translateX(0); }
      
      88%, 100% { transform: translateX(0); }
    }
  </style>
  <g class="peeking-owl" transform-origin="50 70">
    <path d="M 30,50 Q 50,38 70,50 L 70,75 L 30,75 Z" fill="#fca5a5" />
    <polygon points="30,50 25,35 42,46" fill="#f87171" />
    <polygon points="70,50 75,35 58,46" fill="#f87171" />
    <circle cx="42" cy="54" r="7" fill="white" stroke="#991b1b" stroke-width="1.5" />
    <circle cx="40" cy="54" r="3" fill="#991b1b" class="shifty-pupil" />
    <circle cx="58" cy="54" r="7" fill="white" stroke="#991b1b" stroke-width="1.5" />
    <circle cx="56" cy="54" r="3" fill="#991b1b" class="shifty-pupil" />
    <polygon points="48,58 52,58 50,63" fill="#fef08a" />
  </g>
  <!-- Front Wall / Bush -->
  <rect x="6" y="60" width="88" height="40" fill="#34d399" rx="10" />
  <rect x="6" y="60" width="88" height="6" fill="#10b981" rx="3" />
</svg>
