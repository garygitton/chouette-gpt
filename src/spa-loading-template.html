<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <style>
    :root {
      --bg-light: #ffffff;
      --bg-dark: #0b0f19;
      --text-light: #1e293b;
      --text-dark: #f8fafc;
      --indigo: #6366f1;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-light);
      color: var(--text-light);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: var(--bg-dark);
        color: var(--text-dark);
      }
    }
    .spa-loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }
    
    /* Animation Stage for the owl mascot */
    .owl-stage {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 120px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    
    .logo-pulse {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background-color: rgba(99, 102, 241, 0.15);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      z-index: 1;
    }
    
    /* The animated character container */
    .owl-character {
      width: 72px;
      height: 72px;
      position: absolute;
      transform-origin: bottom center;
      animation: owl-dance-routine 9s infinite linear;
      z-index: 10;
    }
    
    .logo-svg {
      width: 100%;
      height: 100%;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.1); }
    }
    
    /* Owl walking, moonwalking, and dancing animation */
    @keyframes owl-dance-routine {
      /* 0% to 33%: Walk forward (left to right) with step tilting & bobbing */
      0% {
        transform: translateX(-140px) translateY(0) rotate(0deg) scaleX(1);
      }
      5% {
        transform: translateX(-100px) translateY(-8px) rotate(6deg) scaleX(1);
      }
      10% {
        transform: translateX(-60px) translateY(0) rotate(-6deg) scaleX(1);
      }
      15% {
        transform: translateX(-20px) translateY(-8px) rotate(6deg) scaleX(1);
      }
      20% {
        transform: translateX(20px) translateY(0) rotate(-6deg) scaleX(1);
      }
      25% {
        transform: translateX(60px) translateY(-8px) rotate(6deg) scaleX(1);
      }
      30% {
        transform: translateX(100px) translateY(0) rotate(-6deg) scaleX(1);
      }
      33% {
        transform: translateX(120px) translateY(0) rotate(0deg) scaleX(1);
      }
      
      /* 34% to 40%: Spin 360deg on itself */
      37% {
        transform: translateX(120px) translateY(-12px) rotate(180deg) scale(1.1);
      }
      40% {
        transform: translateX(120px) translateY(0) rotate(360deg) scale(1);
      }
      
      /* 41% to 68%: Moonwalk backwards (moving right to left while slightly skewed) */
      44% {
        transform: translateX(90px) translateY(-3px) skewX(8deg) rotate(-3deg);
      }
      48% {
        transform: translateX(60px) translateY(0) skewX(-8deg) rotate(3deg);
      }
      52% {
        transform: translateX(30px) translateY(-3px) skewX(8deg) rotate(-3deg);
      }
      56% {
        transform: translateX(0px) translateY(0) skewX(-8deg) rotate(3deg);
      }
      60% {
        transform: translateX(-30px) translateY(-3px) skewX(8deg) rotate(-3deg);
      }
      64% {
        transform: translateX(-60px) translateY(0) skewX(-8deg) rotate(3deg);
      }
      68% {
        transform: translateX(-100px) translateY(-3px) skewX(8deg) rotate(-3deg);
      }
      
      /* 69% to 75%: Spin 360deg in opposite direction */
      72% {
        transform: translateX(-120px) translateY(-12px) rotate(180deg) scale(1.1);
      }
      75% {
        transform: translateX(-120px) translateY(0) rotate(0deg) scale(1);
      }
      
      /* 76% to 92%: Happy dance/jumps in the center */
      78% {
        transform: translateX(0) translateY(-24px) scale(1.25);
      }
      81% {
        transform: translateX(0) translateY(0) scale(1);
      }
      83% {
        transform: translateX(-12px) translateY(0) rotate(-12deg);
      }
      85% {
        transform: translateX(12px) translateY(0) rotate(12deg);
      }
      87% {
        transform: translateX(-8px) translateY(-8px) rotate(-6deg);
      }
      89% {
        transform: translateX(8px) translateY(-8px) rotate(6deg);
      }
      92% {
        transform: translateX(0) translateY(0) scale(1);
      }
      
      /* 93% to 100%: Walk back to start to loop */
      100% {
        transform: translateX(-140px) translateY(0) scale(1);
      }
    }
    
    .title {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.025em;
      margin-bottom: 8px;
    }
    .title span {
      color: var(--indigo);
    }
    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="spa-loader-container">
    <div class="owl-stage">
      <div class="logo-pulse"></div>
      <div class="owl-character">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Ears -->
          <polygon points="10,50 0,20 34,42" fill="#f87171" />
          <polygon points="90,50 100,20 66,42" fill="#f87171" />
          
          <!-- Main head base -->
          <path d="M 10,50 Q 50,26 90,50 Q 90,95 50,95 Q 10,95 10,50 Z" fill="#fca5a5" />
          
          <!-- Eye circles and pupils -->
          <circle cx="34" cy="58" r="14" fill="white" stroke="#991b1b" stroke-width="3" />
          <circle cx="30" cy="58" r="6" fill="#991b1b" />
          <circle cx="28" cy="55.5" r="2" fill="white" />
          
          <circle cx="67" cy="58" r="14" fill="white" stroke="#991b1b" stroke-width="3" />
          <circle cx="62" cy="58" r="6" fill="#991b1b" />
          <circle cx="60" cy="55.5" r="2" fill="white" />
          
          <!-- Beak -->
          <polygon points="46,66 54,66 50,76" fill="#fef08a" />
        </svg>
      </div>
    </div>
    <div class="title">Chouette<span>GPT</span></div>
    <div class="subtitle">Initialisation de l'application...</div>
  </div>
</body>
</html>
